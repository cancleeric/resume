<style>
:root {
  /* ───── LIGHT THEME ───── */
  /* surfaces */
  --bg: #FFFFFF;
  --bg-2: #F8F9FB;
  --surface-1: #FFFFFF;
  --surface-2: #F1F3F6;
  --surface-3: #E8EBF0;
  --border: #E5E7EB;
  --border-strong: #D1D5DB;
  --border-subtle: #EFF1F4;

  /* text */
  --text-hi: #0A0B0F;
  --text-mid: #52555F;
  --text-low: #8A8D96;
  --text-dim: #777A83;

  /* brand */
  --orange: #FF6B35;
  --orange-soft: rgba(255, 107, 53, 0.10);
  --orange-line: rgba(255, 107, 53, 0.30);
  --cyan: #0EA5E9;
  --cyan-soft: rgba(14, 165, 233, 0.08);
  --cyan-line: rgba(14, 165, 233, 0.25);

  /* semantic */
  --live: #16A34A;
  --ga: #0EA5E9;
  --beta: #D97706;

  /* radii */
  --r-xs: 3px;
  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 8px;

  /* type */
  --font-sans: 'Inter', 'IBM Plex Sans TC', system-ui, sans-serif;
  --font-tc: 'IBM Plex Sans TC', 'Inter', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* shadow */
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.06);
  --shadow-glow-orange: 0 0 0 1px rgba(255, 107, 53, 0.4), 0 20px 60px -20px rgba(255, 107, 53, 0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text-hi);
  font-family: var(--font-sans);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
  letter-spacing: -0.005em;
}

body {
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(255,107,53,0.05), transparent 60%),
    radial-gradient(900px 500px at -10% 30%, rgba(14,165,233,0.04), transparent 60%),
    var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid bg — light hairlines */
.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, #F1F3F6 1px, transparent 1px),
    linear-gradient(to bottom, #F1F3F6 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 80%);
  opacity: 0.7;
}

::selection { background: rgba(255,107,53,0.22); color: #0A0B0F; }

a { color: inherit; text-decoration: none; }
button { font: inherit; background: none; border: none; color: inherit; cursor: pointer; }

/* utility classes used by components */
.mono { font-family: var(--font-mono); font-feature-settings: "ss01"; }
.tc { font-family: var(--font-tc); }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-low);
}

/* container */
.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
.section { position: relative; padding: 120px 0; }
.section + .section { border-top: 1px solid var(--border-subtle); }

/* buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 44px; padding: 0 18px;
  border-radius: var(--r-md);
  font-size: 14px; font-weight: 500;
  letter-spacing: -0.005em;
  transition: all 0.18s ease;
  white-space: nowrap;
  border: 1px solid transparent;
}
.btn-primary {
  background: var(--orange);
  color: #FFFFFF;
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(255,107,53,0.25), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-primary:hover {
  background: #FF7E4F;
  box-shadow: 0 0 0 4px rgba(255,107,53,0.12), 0 1px 2px rgba(255,107,53,0.25);
  transform: translateY(-1px);
}
.btn-ghost {
  background: var(--bg);
  color: var(--text-hi);
  border-color: var(--border-strong);
}
.btn-ghost:hover {
  background: var(--surface-2);
  border-color: #B5B8C0;
}
.btn-sm { height: 36px; padding: 0 14px; font-size: 13px; }

/* badge */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 8px;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em;
  border-radius: var(--r-xs);
  border: 1px solid var(--border);
  color: var(--text-mid);
  background: var(--surface-2);
}
.badge-live { color: var(--live); border-color: rgba(22,163,74,0.30); background: rgba(22,163,74,0.06); }
.badge-ga { color: var(--ga); border-color: rgba(14,165,233,0.30); background: rgba(14,165,233,0.06); }
.badge-beta { color: var(--beta); border-color: rgba(217,119,6,0.30); background: rgba(217,119,6,0.06); }
.badge-orange { color: var(--orange); border-color: var(--orange-line); background: var(--orange-soft); }
.badge-dot::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}

/* card */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, transform 0.2s, background 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }

/* fade in animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.reveal { animation: fadeUp 0.7s ease both; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.pulse { animation: pulse 1.8s ease-in-out infinite; }

/* scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #B5B8C0; }

/* heading sizes */
.h-display { font-size: clamp(56px, 7.5vw, 112px); line-height: 0.96; letter-spacing: -0.045em; font-weight: 700; }
.h-1 { font-size: 56px; line-height: 1.04; letter-spacing: -0.03em; font-weight: 600; }
.h-2 { font-size: 40px; line-height: 1.1; letter-spacing: -0.025em; font-weight: 600; }
.h-3 { font-size: 24px; line-height: 1.25; letter-spacing: -0.015em; font-weight: 600; }
.h-4 { font-size: 18px; line-height: 1.3; letter-spacing: -0.01em; font-weight: 600; }

.section-label {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 24px;
}
.section-label::before {
  content: ""; width: 24px; height: 1px; background: var(--orange);
}

.section-title {
  font-size: clamp(40px, 5vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.035em;
  font-weight: 600;
  max-width: 18ch;
  margin-bottom: 20px;
  color: var(--text-hi);
}
.section-sub {
  color: var(--text-mid);
  font-size: 17px;
  max-width: 60ch;
  line-height: 1.55;
}

/* sticky TOC */
.sticky-toc {
  position: fixed;
  right: 32px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 40;
  display: flex; flex-direction: column; gap: 4px;
  padding: 14px 12px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-md);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-low);
}
.sticky-toc a {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.sticky-toc a:hover { color: var(--text-hi); background: var(--surface-2); }
.sticky-toc a.active { color: var(--orange); }
.sticky-toc a .dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.sticky-toc a.active .dot { opacity: 1; box-shadow: 0 0 6px currentColor; }
@media (max-width: 1180px) { .sticky-toc { display: none; } }

/* bottom dock */
.bottom-dock {
  position: fixed;
  bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  display: flex; align-items: center; gap: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 6px;
  box-shadow: 0 20px 60px rgba(15,23,42,0.10), 0 1px 2px rgba(15,23,42,0.04);
}
.bottom-dock .item {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text-mid);
  border-radius: 6px;
  transition: all 0.15s;
}
.bottom-dock .item:hover { color: var(--text-hi); background: var(--surface-2); }
.bottom-dock .divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
.bottom-dock .cta {
  background: var(--orange);
  color: #FFFFFF;
  font-family: var(--font-sans);
  font-weight: 600;
  padding: 10px 18px;
}
.bottom-dock .cta:hover { background: #FF7E4F; }

/* top nav */
.nav {
  position: sticky;
  top: 0;
  z-index: 30;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-subtle);
}
.nav-inner {
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.nav-logo .mark {
  width: 30px; height: 30px;
  color: var(--cyan);
  flex-shrink: 0;
}
.nav-links { display: flex; gap: 6px; align-items: center; }
.nav-links a {
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text-mid);
  border-radius: 4px;
  transition: color 0.15s;
}
.nav-links a:hover { color: var(--text-hi); }

.theme-switch {
  display: inline-flex !important;
  align-items: center;
  gap: 6px;
  padding: 6px 10px !important;
  margin-left: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border) !important;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px !important;
  letter-spacing: 0.08em;
  color: var(--text-mid) !important;
}
.theme-switch:hover {
  background: var(--surface-3);
  color: var(--text-hi) !important;
  border-color: var(--border-strong) !important;
}
.theme-switch .theme-icon { font-size: 13px; line-height: 1; }
.theme-switch .theme-label { text-transform: uppercase; }

@media (max-width: 900px) {
  .nav-links a:not(.lf):not(.cta):not(.theme-switch) { display: none; }
}

/* ─── LIGHT-THEME OVERRIDES for hardcoded dark surfaces in components ─── */

/* hero status pill */
.hero-status {
  background: var(--surface-1) !important;
  border-color: var(--border) !important;
  box-shadow: var(--shadow-sm);
}

/* hero title gradient – light gradient */
html[data-theme="light"] .hero-title .gradient {
  background-image: linear-gradient(180deg, #0A0B0F 0%, #4A4D55 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* hero claim quote – left border */
.hero-claim { color: var(--text-hi) !important; }
.hero-claim b { color: var(--orange) !important; }

/* pipeline visual */
.pipeline-visual {
  background:
    radial-gradient(circle at 50% 50%, rgba(255,107,53,0.04), transparent 60%),
    linear-gradient(180deg, #FFFFFF, #F8F9FB) !important;
  border-color: var(--border) !important;
  box-shadow: var(--shadow-md);
}
.pipeline-visual::before {
  background-image:
    linear-gradient(to right, rgba(15,23,42,0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(15,23,42,0.04) 1px, transparent 1px) !important;
}
.pipeline-stage .stage-row {
  background: var(--surface-1) !important;
  border-color: var(--border) !important;
  box-shadow: var(--shadow-sm);
}
.pipeline-stage .stage-row.active {
  background: var(--orange-soft) !important;
  border-color: var(--orange-line) !important;
}

/* KPI band */
.availability-bar {
  background: linear-gradient(90deg, rgba(22,163,74,0.06), rgba(22,163,74,0.0)) !important;
  border-color: rgba(22,163,74,0.25) !important;
}
.availability-bar .msg { color: var(--text-hi) !important; }

/* trust */
.trust-section {
  background: linear-gradient(180deg, var(--bg-2), transparent) !important;
}
/* 信任數字：亮底用更深的青 + 加重，原 var(--cyan) #0EA5E9 對比不足 */
.trust-cell .count {
  color: #0369A1 !important;
  font-weight: 600;
}

/* services featured card */
.service-card.featured {
  background: linear-gradient(180deg, var(--bg-2), #FFFFFF) !important;
}
.service-card.featured::after {
  background-image:
    linear-gradient(to right, rgba(15,23,42,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(15,23,42,0.03) 1px, transparent 1px) !important;
}
.service-card { box-shadow: var(--shadow-sm); }

/* why-studio：bad tone icon 在亮底改用正色橘（原 #FF9E7E 淺橘在白底糊掉）*/
.tone-icon.bad { color: var(--orange) !important; }

/* pricing highlight card big number */
.price-card { box-shadow: var(--shadow-sm); }
.price-card.highlight {
  background:
    linear-gradient(180deg, #FFF7F2 0%, #FFFFFF 100%) !important;
  border-color: var(--orange-line) !important;
  box-shadow: 0 30px 60px -30px rgba(255,107,53,0.30), var(--shadow-md);
}
html[data-theme="light"] .price-card.highlight .price-amount .num {
  background-image: linear-gradient(180deg, #0A0B0F 0%, #FF6B35 120%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.price-card.highlight::before {
  color: #FFFFFF !important;
}

.tl-card { box-shadow: var(--shadow-sm); }

/* studio */
.org-wrap { box-shadow: var(--shadow-sm); }
.org-wrap::before {

}

/* tech */
.tech-grid { box-shadow: var(--shadow-sm); }

/* cta wrap */
.cta-wrap {
  background:
    radial-gradient(800px 400px at 80% 100%, rgba(14,165,233,0.08), transparent 60%),

}
.cta-wrap::before {

}

.ai-tag { background: var(--cyan-soft) !important; color: var(--cyan) !important; border-color: var(--cyan-line) !important; }

/* flow particle keep orange/cyan glows but smaller halo */

.flow-particle.p3 { box-shadow: 0 0 10px var(--cyan); }

/* version switcher */
.vs-switcher{display:flex;justify-content:flex-end;align-items:center;gap:4px;padding:5px 18px;background:#0a0f1f;font-size:11.5px;font-weight:600;letter-spacing:.04em;border-bottom:1px solid rgba(255,255,255,.06);font-family:Inter,sans-serif}

.meta-live{padding:9px 18px;background:linear-gradient(90deg,#064e3b 0%,#065f46 100%);color:#d1fae5;font-size:12.5px;line-height:1.5;font-family:Inter,sans-serif}

<script>
/* bottom-dock 捲動自動隱藏：下滑收、上滑/近頂/近底顯示 */
(function(){
  var lastY=window.scrollY;
  window.addEventListener('scroll',function(){
    var dock=document.querySelector('.bottom-dock');
    if(!dock)return;
    var y=window.scrollY, h=document.documentElement.scrollHeight, vh=window.innerHeight;
    if(y<300 || (y+vh)>(h-200)){ dock.classList.remove('dock-hidden'); }
    else if(y>lastY+8){ dock.classList.add('dock-hidden'); }
    else if(y<lastY-8){ dock.classList.remove('dock-hidden'); }
    lastY=y;
  },{passive:true});
})();
</script>
<script>
/* 量 meta-live 高度，讓 sticky nav 接在其下方 */
(function(){
  function setMetaH(){
    var m=document.querySelector('.meta-live');
    if(m)document.documentElement.style.setProperty('--meta-h',m.offsetHeight+'px');
  }
  setMetaH();
  window.addEventListener('resize',setMetaH);
  window.addEventListener('load',setMetaH);
})();
</script>
